<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
  :root {
    /* ===== 往路: ミントティール × クリーム × ローズ ===== */
    --primary:#96BFBC;          /* ミントティール: ヘッダー・プライマリ */
    --header-bg:#96BFBC;
    --accent:#8B4513;            /* コッパーブラウン: ティールの補色系強調 */
    --bg:#E8EDDA;                /* クリームホワイト: 背景 */
    --card:#FFFFFF;              /* 白: カード */
    --card2:#F4F8F2;             /* 薄クリーム: 行交互 */
    --text:#1A1A1A;              /* 黒: メインテキスト */
    --sub:#5A7A78;               /* ダークティール: サブテキスト */
    --grid:#C8D8D6;              /* 薄ティール: 区切り線 */
    --bus:#FFFDF5;               /* クリーム薄: バス背景 */
    --astram:#EDF5F4;            /* 薄ミント: アストラム背景 */
    --walk:#F2F4EE;              /* 薄クリーム: 徒歩背景 */
    --hour-direct-bg:#FBF0E8;   /* 薄コッパー: 直通行強調背景 */
    --hour-direct-border:#8B4513; /* コッパー: 直通行左ボーダー */
    --tab-bar-bg:#F4F8F2;
    --radius:12px;
    --time-label-bg:#D4A2A6;    /* ローズピンク: 出発/到着ボタン */
    --search-btn-bg:#D4A2A6;    /* ローズピンク: 検索ボタン */
    --active-tab:#5A7A78;
    --dep-color:#8B4513;         /* コッパー: 発時刻 */
    --arr-color:#D4A2A6;         /* ローズ: 着時刻 */
    --direct-badge:#8B4513;      /* コッパー: 直通バッジ */
    --numata-color:#8B4513;      /* コッパー: 沼田（警告） */
    --card-header:#96BFBC;       /* ミントティール: カードヘッダー */
  }
  :root.kaeri-mode {
    /* ===== 復路: ダークネイビー × モーブ × スレートブルー ===== */
    --primary:#334E64;           /* ダークネイビー: ヘッダー・プライマリ */
    --header-bg:#334E64;
    --accent:#E07A5F;            /* テラコッタ/サーモン: ネイビーの補色強調 */
    --bg:#D4B8C6;                /* モーブピンク薄め: 背景 */
    --card:#FFFFFF;              /* 白: カード */
    --card2:#F9F2F6;             /* 薄モーブ: 行交互 */
    --text:#1A1A1A;              /* 黒: メインテキスト */
    --sub:#4A6A7A;               /* スレートブルー: サブテキスト */
    --grid:#A88BA0;              /* ミドルモーブ: 区切り線 */
    --bus:#FDF8FA;               /* 薄ピンク: バス背景 */
    --astram:#F0F5F8;            /* 薄スレート: アストラム背景 */
    --walk:#F5F0F3;              /* 薄モーブ: 徒歩背景 */
    --hour-direct-bg:#FDF0EC;   /* 薄コーラル: 直通行強調背景 */
    --hour-direct-border:#E07A5F; /* テラコッタ: 直通行左ボーダー */
    --tab-bar-bg:#F0E8ED;
    --time-label-bg:#688B97;    /* スレートブルー: 出発/到着ボタン */
    --search-btn-bg:#C89EB4;    /* モーブピンク: 検索ボタン */
    --active-tab:#334E64;
    --dep-color:#E07A5F;         /* テラコッタ: 発時刻 */
    --arr-color:#688B97;         /* スレートブルー: 着時刻 */
    --direct-badge:#E07A5F;      /* テラコッタ: 直通バッジ */
    --numata-color:#E07A5F;      /* テラコッタ: 沼田警告 */
    --card-header:#688B97;       /* スレートブルー: カードヘッダー */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  :root{color-scheme:light;}
  html{background:#E8EDDA !important;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg) !important;color:var(--text) !important;min-height:100vh;max-width:480px;margin:0 auto;-webkit-text-size-adjust:100%;}
  * {-webkit-tap-highlight-color:transparent;}

  header{background:var(--header-bg);color:white;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.2);transition:background .4s,box-shadow .4s}
  
  header h1{font-size:15px;font-weight:700}
  header p{font-size:10px;opacity:.7;margin-top:2px}

  

  /* 平日・休日トグル */
  .daytype-row{display:flex;gap:6px;margin-bottom:6px;margin-top:6px}
  .daytype-row button{flex:1;padding:7px;border:1.5px solid rgba(255,255,255,.35);border-radius:8px;
    font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);
    background:transparent;transition:all .2s}
  .daytype-row button.active{background:white;color:var(--primary);border-color:white;box-shadow:0 2px 8px rgba(0,0,0,.15);font-weight:700}

  /* 往路・帰路トグル */
  .direction-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:30px;padding:3px;margin-bottom:0}
  .direction-toggle button{flex:1;padding:8px;border:none;border-radius:27px;font-family:inherit;font-size:12px;
    font-weight:700;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.6);background:transparent}
  .direction-toggle button.active{background:white;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.2)}

  /* 出発・到着トグル＋時刻 */
  .time-area{display:flex;flex-direction:column;gap:6px}


  .time-row{display:flex;gap:8px;align-items:center;width:100%}
  .time-label{background:var(--time-label-bg,var(--accent));color:white;font-size:14px;font-weight:700;padding:8px 14px;border-radius:8px;white-space:nowrap;text-align:center;border:none;cursor:pointer;transition:all .3s;font-family:inherit;flex:1}
  .time-label:active{opacity:.8;transform:scale(.96)}
  .time-label.arr-label{background:#2e8b57}
  .time-label.arr-label{background:#2e8b57}
  .time-selects select{flex:1;min-width:60px;padding:8px 4px;border:none;border-radius:8px;font-family:inherit;font-size:15px;
    font-weight:700;background:white;color:var(--primary);text-align:center;cursor:pointer;-webkit-appearance:none;appearance:none}
  #sel-hour{flex:1;padding:8px 4px;border:none;border-radius:8px;font-family:inherit;font-size:18px;font-weight:700;background:white;color:var(--primary);text-align:center;cursor:pointer;-webkit-appearance:none;appearance:none}
  .now-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;font-family:inherit;
    font-size:13px;font-weight:700;padding:8px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;flex:1;text-align:center}

  .search-btn{width:100%;padding:13px;background:var(--search-btn-bg,var(--primary));color:white;border:none;border-radius:10px;
    font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:1px;
    transition:opacity .15s;box-shadow:0 3px 10px rgba(232,80,10,.4)}
  .search-btn:active{opacity:.85}

  .tab-bar{display:flex;background:var(--tab-bar-bg);border-bottom:2px solid var(--grid);padding:0 12px;gap:4px;position:sticky;top:0;z-index:99;transition:background .4s}
  .tab-btn{flex:1;padding:10px 4px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;
    color:#aaa;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
  .tab-btn.active{color:var(--active-tab,var(--primary));border-bottom-color:var(--active-tab,var(--primary))}

  .results{padding:12px 12px 24px}
  .result-header{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:500}

  .result-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;transition:background .4s;
    box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
  .card-summary{display:flex;align-items:flex-end;padding:10px 14px;background:var(--card-header,var(--primary));color:white;gap:8px;transition:background .3s}
  .card-summary .dep{font-size:20px;font-weight:900}
  .card-summary .arrow{font-size:11px;opacity:.6;flex:1;text-align:center;padding-bottom:3px;}
  .card-summary .arr{font-size:20px;font-weight:900}
  .card-summary .duration{font-size:11px;background:rgba(255,255,255,.2);padding:3px 8px;border-radius:20px;text-align:center;line-height:1.4;}

  .card-detail{padding:10px 14px}
  .route-step{display:flex;align-items:stretch;gap:10px;margin-bottom:2px}
  .step-line{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
  .step-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--primary);background:white;flex-shrink:0;margin-top:4px;transition:border-color .3s}
  .step-dot.depart{background:#e8500a;border-color:#e8500a}
  .step-dot.arrive{background:#2e8b57;border-color:#2e8b57}
  .step-connector{flex:1;width:2px;min-height:8px;background:var(--grid);margin:2px 0}
  .step-connector.bus-line{background:#f0a500}
  .step-connector.astram-line{background:#e91e8c}
  .step-connector.walk-line{border-left:2px dashed #aaa;background:transparent;width:0}
  .step-body{flex:1;padding-bottom:8px}
  .step-station{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
  .step-station .time-badge{display:inline-block;font-size:14px;font-weight:900;color:var(--sub);margin-right:4px}
  .step-station .time-badge-dep{display:inline-block;font-size:22px;font-weight:900;color:var(--dep-color,var(--primary));margin-right:4px;letter-spacing:-0.5px;transition:color .3s}
  .step-station .dep-label{font-size:13px;font-weight:700;color:var(--dep-color,var(--primary));margin-left:1px}
  .step-transport{margin:3px 0;padding:5px 10px;border-radius:6px;font-size:11px}
  .step-transport.bus{background:var(--bus);border-left:3px solid #f0a500}
  .step-transport.astram{background:var(--astram);border-left:3px solid #e91e8c}
  .step-transport.walk{background:var(--walk);border-left:3px dashed #aaa}
  .step-transport .t-name{font-weight:700;color:#333;font-size:12px}
  .step-transport .t-route{color:var(--sub);font-size:10px;margin-top:1px}
  .step-transport .t-stop{display:block;font-size:15px;font-weight:900;color:#c0392b;margin-top:4px;letter-spacing:0.3px}

// ==================== 状態 ====================
let direction='oi_astram', dayType='weekday', depArr='arr';

function setDayType(d){
  dayType=d;
  ['weekday','saturday','holiday'].forEach(k=>document.getElementById('btn-'+k).classList.toggle('active',k===d));
  // 曜日ごとにルートクラスを切り替え
  const root=document.documentElement;
  root.classList.remove('sat-mode','hol-mode');
  if(d==='saturday') root.classList.add('sat-mode');
  else if(d==='holiday') root.classList.add('hol-mode');
  doSearch();
}
function setDirection(d){
  direction=d;
  const isOi=(d==='oi'||d==='oi_astram');
  const isKaeri=(d==='kaeri_astram'||d==='kaeri_3chome');
  const btnOi=document.getElementById('btn-oi');
  const btnKaeri=document.getElementById('btn-kaeri');
  btnOi.classList.toggle('active',isOi);
  btnKaeri.classList.toggle('active',isKaeri);
  if(d==='oi') btnOi.textContent='▶ 行き(3丁目バス→市大)';
  else if(d==='oi_astram') btnOi.textContent='▶ 行き(アトム毘沙門→市大)';
  if(d==='kaeri_astram') btnKaeri.textContent='◀ 帰り(市大→アトム毘沙門)';
  else if(d==='kaeri_3chome') btnKaeri.textContent='◀ 帰り(市大→3丁目)';
  // 行き→到着モード、帰り→出発モードをデフォルトに
  setDepArr(isOi?'arr':'dep');
  // 復路モードでkaeri-modeクラスを付与
  document.documentElement.classList.toggle('kaeri-mode', isKaeri);
  doSearch();
}
function toggleOiMode(){
  // 往路ボタン押下: oi_astram → oi → oi_astram と切り替え（帰りから来た場合は初期表示oi_astram）
  if(direction==='kaeri_astram'||direction==='kaeri_3chome') setDirection('oi_astram');
  else if(direction==='oi_astram') setDirection('oi');
  else setDirection('oi_astram');
}
function toggleKaeriMode(){
  // 帰りボタン押下: kaeri_astram → kaeri_3chome → kaeri_astram（行きから来た場合は初期表示kaeri_astram）
  if(direction==='oi'||direction==='oi_astram') setDirection('kaeri_astram');
  else if(direction==='kaeri_astram') setDirection('kaeri_3chome');
  else setDirection('kaeri_astram');
}
function toggleDepArr(){ setDepArr(depArr==='dep'?'arr':'dep'); }
function setDepArr(d){
  depArr=d;
  document.getElementById('time-label').textContent=d==='dep'?'出発':'到着';
  document.getElementById('time-label').className='time-label'+(d==='arr'?' arr-label':'');
}
function setNow(){
  const n=new Date();
  document.getElementById('sel-hour').value=String(n.getHours());
  doSearch();
}

// ==================== ルート計算 ====================
function findNext(arr,afterMin,minWait=0){
  return arr.map(toMin).filter(m=>m>=afterMin+minWait).sort((a,b)=>a-b)[0];
}
function findPrev(arr,beforeMin,maxWait=0){
  const mins=(typeof arr[0]==='string')?arr.map(toMin):arr;
  return mins.filter(m=>m<=beforeMin-maxWait).sort((a,b)=>b-a)[0];
}
// 大塚バス停で待ち時間が8分以上の場合、5分未満で乗れる便を探す
function findEarlyBusHint(aArr, chosenDep){
  const wait = chosenDep - aArr;
  if(wait < 8) return null; // 8分未満なら補足不要
  const gwList=getGwBus(), nList=getNumataBus();
  // 大塚着+3分以上5分未満で出発する直通便を探す
  const earlyDirect = gwList.find(([dep])=>{ const t=toMin(dep); return t>=aArr+3&&t<aArr+5; });
  const earlyNumata = nList.find(([dep])=>{ const t=toMin(dep); return t>=aArr+3&&t<aArr+5; });
  const candidates = [];
  if(earlyDirect){
    const isRoute1 = earlyDirect[3]==='1';
    if(isRoute1){
      // 路線1-9は専用フィールドで返す（描画側で大きく表示）
      return {route1Special: true, dep: earlyDirect[0], wait: toMin(earlyDirect[0])-aArr};
    }
    candidates.push({dep:toMin(earlyDirect[0]),label:`市大行き${earlyDirect[0]}発`,wait:toMin(earlyDirect[0])-aArr});
  }
  // 沼田便は直通と同時刻なら表示しない
  if(earlyNumata){
    const nuDep=toMin(earlyNumata[0]);
    const alreadyShown=candidates.some(c=>c.dep===nuDep);
    if(!alreadyShown) candidates.push({dep:nuDep,label:'沼田料金所下車'+earlyNumata[0]+'発',wait:nuDep-aArr});
  }
  if(!candidates.length) return null;
  candidates.sort((a,b)=>a.dep-b.dep);
  return candidates.map(c=>`${c.label}（${c.wait}分）`).join('、');
}

// 帰路: バス着→アストラム乗り換えが5分未満の場合、次のアストラム便時刻を返す
function findNextAstramHint(gArr, chosenAstramDep){
  const wait = chosenAstramDep - gArr;
  if(wait >= 5) return null; // 5分以上なら補足不要
  // 選んだ便の次のアストラム便を探す
  const next = ASTRAM_KAERI_PAIRS.find(([d])=>toMin(d)>chosenAstramDep);
  if(!next) return null;
  return {dep: fmt(next[0]), arr: fmt(next[1])};
}

      ?{dep:toMin(d[0]),arr:dOtsuka,via:'direct',destBadge:d[2]||'',lineName:d[2]==='201'?'西風みなとライン':''}
      :{dep:toMin(n[0]),arr:nOtsuka,via:'numata',destBadge:n[2]||'',lineName:''};
  }
  if(!byArr){
    const gw=bestKaeriBus(inputMin);if(!gw)return null;
    const gMin=gw.dep,gArr=gw.arr;
    const astK=getAstramKaeriArr(gArr+4);if(!astK)return null;
    const aMin=astK.dep,aArr=astK.arr;
    const useNumata=gw.via==='numata';
    const lineName=gw.lineName||'';
    const is修=!useNumata&&gw.destBadge==='修';
    const busName=useNumata?'🚌 広電バス（沼田料金所前発）':lineName?`🚌 広電バス（市立大学経由）【${lineName}】`:is修?'🚌 広電バス':'🚌 広電バス（市立大学経由）';
    return{
      dep:fromMin(gMin),arr:fromMin(aArr),dur:aArr-gMin,isDirect:!useNumata,
      busKind:useNumata?'沼':'直',destBadge:gw.destBadge,lineName,
      astramDep:fromMin(aMin),astramArr:fromMin(aArr),busDep:fromMin(gMin),busArr:fromMin(gArr),
      steps:[
        {type:'depart',station:useNumata?'沼田料金所前':'市立大学前',time:fromMin(gMin),isNumata:useNumata},
        {type:'transport',kind:'bus',
          name:busName,
          route:useNumata?'沼田料金所前 → 大塚駅':'市立大学前 → 大塚駅',
          time:`${fromMin(gMin)}発→${fromMin(gArr)}着`,wait:null,dep:fromMin(gMin),lineName:(!useNumata&&lineName)?lineName:null,route修Name:is修?'①広島修道大学・免許センター五日市方面利用':null},
        {type:'station',station:'大塚駅',time:fromMin(gArr)},
        {type:'transport',kind:'walk',name:'🚶 徒歩',route:'バス停 → アストラム大塚駅',time:'約2〜3分',wait:`${aMin-gArr}分`},
        {type:'station',station:'アストラム大塚駅',time:fromMin(aMin)},
        {type:'transport',kind:'astram',name:'🚃 アストラムライン',route:'大塚駅 → 毘沙門台駅',time:`${fromMin(aMin)}発→${fromMin(aArr)}着`,wait:null,dep:fromMin(aMin),nextAstramHint:findNextAstramHint(gArr,aMin)},
        {type:'arrive',station:'アストラム毘沙門台駅',time:fromMin(aArr)},
      ]
    };
  } else {
    const aArr=inputMin;
    const astPair=ASTRAM_KAERI_PAIRS.slice().reverse().find(([d,a])=>toMin(a)<=aArr);
    if(!astPair)return null;
    const aMin=toMin(astPair[0]),aArrT=toMin(astPair[1]);
    const gwPrev=getGwBusKaeri().slice().reverse().find(([,arr])=>toMin(arr)<=aMin-3);
    const numPrev=getNumataBusKaeri().slice().reverse().find(([,arr])=>toMin(arr)+2<=aMin-3);
    if(!gwPrev&&!numPrev)return null;
    let gMin,gArr,useNumata,destBadge='',lineName='';
    if(gwPrev&&numPrev){useNumata=toMin(numPrev[0])>toMin(gwPrev[0]);}
    else{useNumata=!gwPrev;}
    if(useNumata){gMin=toMin(numPrev[0]);gArr=toMin(numPrev[1])+2;destBadge=numPrev[2]||'';}
    else{gMin=toMin(gwPrev[0]);gArr=toMin(gwPrev[1]);destBadge=gwPrev[2]||'';lineName=destBadge==='201'?'西風みなとライン':'';}
    const is修2=!useNumata&&destBadge==='修';
    const busName2=useNumata?'🚌 広電バス（沼田料金所前発）':lineName?`🚌 広電バス（市立大学経由）【${lineName}】`:is修2?'🚌 広電バス':'🚌 広電バス（市立大学経由）';
    return{
      dep:fromMin(gMin),arr:fromMin(aArrT),dur:aArrT-gMin,isDirect:!useNumata,
      busKind:useNumata?'沼':'直',destBadge,lineName,
      astramDep:fromMin(aMin),astramArr:fromMin(aArrT),busDep:fromMin(gMin),
      steps:[
        {type:'depart',station:useNumata?'沼田料金所前':'市立大学前',time:fromMin(gMin),isNumata:useNumata},
        {type:'transport',kind:'bus',
          name:busName2,
          route:useNumata?'沼田料金所前 → 大塚駅':'市立大学前 → 大塚駅',
          time:`${fromMin(gMin)}発→${fromMin(gArr)}着`,wait:null,dep:fromMin(gMin),lineName:(!useNumata&&lineName)?lineName:null,route修Name:is修2?'①広島修道大学・免許センター五日市方面利用':null},
        {type:'station',station:'大塚駅',time:fromMin(gArr)},
        {type:'transport',kind:'walk',name:'🚶 徒歩',route:'バス停 → アストラム大塚駅',time:'約2〜3分',wait:`${aMin-gArr}分`},
        {type:'station',station:'アストラム大塚駅',time:fromMin(aMin)},
        {type:'transport',kind:'astram',name:'🚃 アストラムライン',route:'大塚駅 → 毘沙門台駅',time:`${fromMin(aMin)}発→${fromMin(aArrT)}着`,wait:null,dep:fromMin(aMin),nextAstramHint:findNextAstramHint(gArr,aMin)},
        {type:'arrive',station:'アストラム毘沙門台駅',time:fromMin(aArrT)},

  }
}

// ==================== お気に入り ====================
function favKey(r){
  return `${direction}_${dayType}_${r.dep}_${r.arr}`;
}
function getFavs(){
  try{ return JSON.parse(localStorage.getItem('ichidai_favs')||'{}'); }
  catch(e){ return {}; }
}
function isFav(r){ return !!getFavs()[favKey(r)]; }
function toggleFav(idx){
  const routes=window._currentRoutes||[];
  const r=routes[idx];
  if(!r)return;
  const favs=getFavs();
  const k=favKey(r);
  if(favs[k]) delete favs[k]; else favs[k]=true;
  localStorage.setItem('ichidai_favs',JSON.stringify(favs));
  // 詳細画面のハートを更新
  const btn=document.getElementById('fav-btn-'+idx);
  if(btn) btn.textContent=favs[k]?'❤️':'🤍';
  // 一覧行のハートを更新
  renderHourListFavs();
}
function renderHourListFavs(){
  const routes=window._currentRoutes||[];
  routes.forEach((r,i)=>{
    const row=document.getElementById('hrow-'+i);
    if(!row)return;
    const fav=isFav(r);
    let heart=row.querySelector('.fav-heart');
    if(fav&&!heart){
      heart=document.createElement('span');
      heart.className='fav-heart';
      heart.style.cssText='font-size:16px;margin-left:auto;padding-left:4px;';
      heart.textContent='❤️';
      row.appendChild(heart);
    } else if(!fav&&heart){
      heart.remove();
    }
    // 背景色更新（お気に入り解除時はnextUpStyleのみ、favの帯は完全除去）
    const nextUpStyle=row.getAttribute('data-next-up-style')||'';
    if(fav){
      row.style.cssText='background:#fff0f5;border-left:3px solid #ff69b4;';
    } else {
      row.style.cssText=nextUpStyle;
    }
  });
}

function doSearch(){
  const h=parseInt(document.getElementById('sel-hour').value);
  const inputMin=h*60;
  const byArr=(depArr==='arr');
  const area=document.getElementById('results-area');
  area.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>検索中...</p></div>`;
  setTimeout(()=>{
    // 指定時間と同じ「時」の全便を計算
    const targetHour = byArr
      ? Math.floor(inputMin/60)  // 到着の場合は到着時刻の時
      : h;
    const hourStart = targetHour*60;
    const hourEnd   = hourStart+59;

    // その時間帯の全出発点リスト（往路=3丁目バス、帰路=市大/沼田バス）を収集
    let depMins = [];
    if(!byArr){
      // 出発モード: inputMin以降でhour台の全出発時刻
      if(direction==='oi'){
        OI_BUS[dayType].forEach(([d])=>{
          const t=toMin(d);
          if(t>=inputMin && t<=hourEnd) depMins.push(t);
        });
      } else if(direction==='oi_astram'){
        // アストラム発時刻が時間帯内 OR そのアストラムから乗る広電バスが時間帯内（直前のアストラムも含む）
        ASTRAM_OI_PAIRS.forEach(([d,a])=>{
          const t=toMin(d);
          const aArr=toMin(a);
          const gwList=getGwBus(),nList=getNumataBus();
          const dPair=gwList.find(([dep])=>toMin(dep)>=aArr+5);
          const nPair=nList.find(([dep])=>toMin(dep)>=aArr+5);
          const busT=dPair?toMin(dPair[0]):(nPair?toMin(nPair[0]):null);
          // バスが時間帯内：inputMin前のアストラムでも追加
          if(busT&&busT>=hourStart&&busT<=hourEnd){depMins.push(t);return;}
          // アストラム自体が時間帯かつinputMin以降
          if(t>=inputMin && t<=hourEnd) depMins.push(t);
        });
      } else {
        [...getGwBusKaeri(),...getNumataBusKaeri()].forEach(([d])=>{
          const t=toMin(d);
          if(t>=inputMin && t<=hourEnd) depMins.push(t);
        });
      }
    } else {
      // 到着モード: hour台に到着する全便（逆算）
      const seen=new Set();
      for(let arr=hourStart;arr<=hourEnd;arr++){
        const r=direction==='oi'?calcOi(arr,true):
                direction==='oi_astram'?calcOiAstram(arr,true):
                direction==='kaeri_astram'?calcKaeriAstram(arr,true):
                calcKaeri(arr,true);
        if(r && !seen.has(r.dep)){seen.add(r.dep);depMins.push(toMin(r.dep));}
      }
    }

    // 重複除去・ソート
    depMins=[...new Set(depMins)].sort((a,b)=>a-b);

    // 各出発時刻の結果を計算
    const routes=[];
    depMins.forEach(dep=>{
      const r=direction==='oi'?calcOi(dep):
              direction==='oi_astram'?calcOiAstram(dep):
              direction==='kaeri_astram'?calcKaeriAstram(dep):
              calcKaeri(dep);
      if(r && !routes.find(x=>x.dep===r.dep)) routes.push(r);
    });

    // 行きの場合：市大着時刻が同じ便は出発が遅い便のみ残す
    let filteredRoutes=routes;
    if(direction==='oi'||direction==='oi_astram'){
      const arrMap={};
      routes.forEach(r=>{
        if(!arrMap[r.arr]||toMin(r.dep)>toMin(arrMap[r.arr].dep)){
          arrMap[r.arr]=r;
        }
      });
      filteredRoutes=Object.values(arrMap).sort((a,b)=>toMin(a.dep)-toMin(b.dep));
    }

    // 出発/到着モードに応じて時間帯を厳密にフィルタ
    if(!byArr){
      // 出発モード: アトム毘沙門発(dep)時刻でhour台に限定
      if(direction==='oi_astram'){
        filteredRoutes=filteredRoutes.filter(r=>{
          const t=toMin(r.dep);
          return t>=hourStart&&t<=hourEnd;
        });
      } else {
        filteredRoutes=filteredRoutes.filter(r=>toMin(r.dep)>=hourStart&&toMin(r.dep)<=hourEnd);
      }
    } else {
      // 到着モード: 到着時刻がhour台に収まる便のみ
      filteredRoutes=filteredRoutes.filter(r=>toMin(r.arr)>=hourStart&&toMin(r.arr)<=hourEnd);
    }

    // 結果なし
    if(!filteredRoutes.length){
      area.innerHTML=`<div class="empty-state"><div class="icon">🌙</div><p>${h}時台の便はありません</p></div>`;
      return;
    }

    // 時間帯一覧を描画
    renderHourList(filteredRoutes, area);
  },150);
}

function makeTimeTable(title,timesArr,headerBg,rowBg1,rowBg2,note=''){
  const hours={};
  timesArr.forEach(t=>{
    const base=t.replace(/\(.*\)/,'');
    const h=base.split(':')[0];
    const m=base.split(':')[1];
    const tag=t.match(/\(.*\)/)?t.match(/\(.*\)/)[0]:'';
    if(!hours[h])hours[h]=[];
    // 分のみ表示 + (市)なら赤文字
    const isDirect = tag==='(市)';
    const cell = isDirect
      ? `<span style="color:#c0392b;font-weight:700">${m}(市)</span>`
      : `${m}${tag}`;
    hours[h].push(cell);
  });
  let html=`<div style="margin-bottom:16px;">
    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;padding:6px 10px;background:${headerBg};border-radius:8px;">${title}</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:var(--primary);color:white;">
        <th style="padding:5px 6px;width:28px;">時</th>
        <th style="padding:5px 6px;text-align:left;">分</th>
      </tr></thead><tbody>`;
  const currentHour = new Date().getHours();
  Object.keys(hours).sort((a,b)=>+a-+b).forEach((h,i)=>{
    const isCurrent = +h === currentHour;
    const bg = isCurrent ? '#fff3e0' : (i%2?rowBg2:rowBg1);
    const border = isCurrent ? 'border-left:3px solid #e8500a;' : '';
    html+=`<tr style="background:${bg};${border}">
      <td style="padding:4px 6px;font-weight:900;color:${isCurrent?'#e8500a':'var(--primary)'};text-align:center;">${h}</td>
      <td style="padding:4px 6px;color:#555;">${hours[h].join('　')}</td></tr>`;
  });
  html+=`</tbody></table>`;
  if(note)html+=`<div style="font-size:10px;color:#999;margin-top:4px;">${note}</div>`;
  html+=`</div>`;
  return html;
}

    else if(k.startsWith('kaeri_astram_')){ dir='kaeri_astram'; const rest=k.slice('kaeri_astram_'.length); const p=rest.split('_'); dt=p[0]; dep=p[1]; arr=p[2]; }
    else if(k.startsWith('kaeri_3chome_')){ dir='kaeri_3chome'; const rest=k.slice('kaeri_3chome_'.length); const p=rest.split('_'); dt=p[0]; dep=p[1]; arr=p[2]; }
    else return;
    const dayLabel={weekday:'平日',saturday:'土曜',holiday:'日祝'}[dt]||dt;
    const dirLabel=dir==='oi_astram'?'行き(アトム毘沙門→市大)':dir==='oi'?'行き(3丁目→市大)':dir==='kaeri_astram'?'帰り(市大→アトム毘沙門)':'帰り(市大→3丁目)';
    const item={key:k,dir,dt,dep,arr,dayLabel,dirLabel};
    if(oiDirs.includes(dir)) oiItems.push(item);
    else kaeriItems.push(item);
  });

  // ソート: 曜日順→発時刻順
  const dayOrder={weekday:0,saturday:1,holiday:2};
  const sortItems=(a,b)=>(dayOrder[a.dt]||0)-(dayOrder[b.dt]||0)||toMin(a.dep)-toMin(b.dep);
  oiItems.sort(sortItems); kaeriItems.sort(sortItems);

  const makeFavRow=(item)=>{
    const safeKey=item.key.replace(/[^a-zA-Z0-9_]/g,'-');

    const timeStyle=timeColor?`color:${timeColor};font-weight:900;`:'';
    return `<div class="fav-list-row" id="favrow-${safeKey}">
      <div class="fav-list-info" style="cursor:pointer;" onclick="toggleFavDetail('${safeKey}','${item.dir}','${item.dt}','${item.dep}','${item.arr}')">

        <div style="display:flex;align-items:center;gap:6px;">
          <span class="fav-list-time" style="${timeStyle}">${item.dep} <span style="font-size:11px;color:#aaa;">→</span> ${item.arr}</span>
          <span id="favchev-${safeKey}" style="font-size:12px;color:#aaa;transition:transform .2s;">▼</span>
        </div>
      </div>
      <button class="fav-remove-btn" onclick="removeFav('${item.key}')" title="お気に入り解除">❤</button>
    </div>
    <div id="favdet-${safeKey}" style="display:none;margin-bottom:8px;"></div>`;
  };

  let html=`<div style="padding:12px;">`;
  if(oiItems.length){
    html+=`<div class="fav-section-title">🚃 行き</div>`;
    oiItems.forEach(item=>{ html+=makeFavRow(item); });

  if(kaeriItems.length){

    kaeriItems.forEach(item=>{ html+=makeFavRow(item); });

    const gwList=getGwBus(), nList=getNumataBus();
    const gwTimes=[...gwList.map(([dep])=>dep+'(市)'),...nList.map(([dep])=>dep+'(沼)')].sort((a,b)=>toMin(a.split('(')[0])-toMin(b.split('(')[0]));
    html+=makeTimeTable(`${dir==='oi'?'③ ':'② '}📋 広電バス 大塚駅発（${dayLabel}）`,gwTimes,'#e8f0f8','#fff','#f8f9fa','※(市)=市立大学前直通 (沼)=沼田料金所前止まり（徒歩10分）');
  } else {
    const kd=getGwBusKaeri().map(([dep])=>dep+'(市)');
    const kn=getNumataBusKaeri().map(([dep])=>dep+'(沼)');
    const kaeriTimes=[...kd,...kn].sort((a,b)=>toMin(a.split('(')[0])-toMin(b.split('(')[0]));
    html+=makeTimeTable(`① 📋 広電バス 市立大学前/沼田発→大塚駅着（${dayLabel}）`,kaeriTimes,'#e8f5e9','#f9fffe','#f1f8f4','※(市)=市立大学前発 (沼)=沼田料金所前発');
    const astramKaeriTimes=ASTRAM_KAERI_PAIRS.map(([dep])=>dep);
    html+=makeTimeTable(`② 🚃 アストラムライン 大塚駅発（本通り方面）（${dayLabel}）`,astramKaeriTimes,'#e8f0fb','#f8f9ff','#f0f4ff','※毘沙門台駅を通過する便のみ。毘沙門台駅まで約15分');
    if(dir==='kaeri_3chome'||dir==='kaeri'){
      const busKaeriTimes=BUS_KAERI[dt].map(([t,ten])=>ten?t+'('+ten+')':t);
      html+=makeTimeTable(`③ 🚌 広島交通バス 毘沙門台中発→毘沙門台3丁目着（${dayLabel}）`,busKaeriTimes,'#fffbe6','#fffef5','#fefce8','※毘沙門台3丁目には約6分後に到着。(天)毘沙門天経由 (サ)サンハイツ行');
    }
  }
  html+=`</div>`;
  document.getElementById('results-area').innerHTML=html;
}

// ==================== 初期化 ====================
window.onload=()=>{
  // headerの高さをCSS変数に設定（sticky-controlsのtop計算用）
  // sticky位置を動的計算

  const selH=document.getElementById('sel-hour');
  // ① option追加（時のみ）
  for(let i=5;i<=23;i++){
    const o=document.createElement('option');
    o.value=String(i); o.textContent=`${i}:00台`;
    selH.appendChild(o);
  }

  // ② 現在日時を取得
  const now=new Date();
  const h=now.getHours();
  const m=Math.floor(now.getMinutes()/5)*5;

  // ③ セレクトに値をセット（option追加後に行う）
  selH.value=String(h);

  // ④ 曜日判定
  const dow=now.getDay();
  if(dow===6){dayType='saturday';document.documentElement.classList.add('sat-mode');}
  else if(dow===0){dayType='holiday';document.documentElement.classList.add('hol-mode');}
  else dayType='weekday';
  ['weekday','saturday','holiday'].forEach(k=>document.getElementById('btn-'+k).classList.toggle('active',k===dayType));

  // ⑤ 午前は往路（アトム）・午後は帰路（アトム毘沙門着）
  if(h<12) setDirection('oi_astram');
  else setDirection('kaeri_astram');

  // ⑥ 自動検索（DOM更新が落ち着いてから）
  setTimeout(doSearch, 100);
};
</script>
